# ─── Application ───────────────────────────────────────────────────────────────
spring.application.name=goldvault-backend
server.port=8080

# ─── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/goldvault_db?useSSL=false&serverTimezone=Asia/Colombo&allowPublicKeyRetrieval=true
spring.datasource.username=goldvault_user
spring.datasource.password=GoldVault@2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Chatbot AI fallback (optional) ──────────────────────────────────────────
# Leave anthropic.api.key blank to run the chatbot in rule-only mode (still fully
# functional for gold rates, ticket lookups, FAQs — just won't answer open-ended
# questions outside those rules). Get a key at https://console.anthropic.com
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.model=claude-haiku-4-5-20251001

# ─── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=GoldVaultSuperSecretKey2025XYZ123456789ABCDEFabcdef0123456789
app.jwt.expiration-ms=86400000

# ─── Platform Commission ───────────────────────────────────────────────────────
app.commission.rate-percent=1.5

# ─── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.lk.goldvault=DEBUG
logging.level.org.springframework.security=INFO

# ─── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ─── SMS (Notify.lk) ───────────────────────────────────────────────────────────
# Get your credentials free at https://notify.lk → Dashboard → API
app.sms.enabled=false
app.sms.provider=notify_lk
app.sms.notify-lk.user-id=YOUR_USER_ID
app.sms.notify-lk.api-key=YOUR_API_KEY
app.sms.sender-id=GoldVault

# ─── Expiry Reminder Scheduler ─────────────────────────────────────────────────
# Runs every day at 8:00 AM Colombo time
app.reminders.cron=0 0 8 * * *
app.reminders.days-before=7,3,1


# ─── OCR (Tesseract) ────────────────────────────────────────────────────────────
# Path to your Tesseract installation's "tessdata" folder
# Windows example: C:/Program Files/Tesseract-OCR/tessdata
# Linux example:   /usr/share/tesseract-ocr/4.00/tessdata
app.ocr.tessdata.path=C:/Program Files/Tesseract-OCR/tessdata
app.ocr.enabled=true