# ─── Application ───────────────────────────────────────────────────────────────
spring.application.name=goldvault-backend
server.port=8080

# ─── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/goldvault_db?useSSL=false&serverTimezone=Asia/Colombo&allowPublicKeyRetrieval=true
spring.datasource.username=goldvault_user
spring.datasource.password=GoldVault@2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=GoldVaultSuperSecretKey2025XYZ123456789ABCDEFabcdef0123456789
app.jwt.expiration-ms=86400000

# ─── Platform Commission ───────────────────────────────────────────────────────
app.commission.rate-percent=1.5

# ─── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.lk.goldvault=DEBUG
logging.level.org.springframework.security=INFO

# ─── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads