<header class="gv-topbar">
    <div class="gv-topbar-left">
      <button class="gv-topbar-icon-btn" type="button" (click)="menuToggle.emit()" aria-label="Toggle menu">
        <i class="pi pi-bars"></i>
      </button>
  
      <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="#C9A14A" stroke-width="2"/>
        <path d="M12 20 L20 12 L28 20 L20 28 Z" stroke="#C9A14A" stroke-width="1.5" fill="none"/>
        <circle cx="20" cy="20" r="3" fill="#C9A14A"/>
      </svg>
    </div>
  
    <div class="gv-topbar-right">
      <button
        class="gv-topbar-icon-btn"
        type="button"
        (click)="themeService.toggle()"
        [pTooltip]="themeTooltip()"
        tooltipPosition="bottom"
      >
        <i class="pi" [class.pi-sun]="!themeService.isDark()" [class.pi-moon]="themeService.isDark()"></i>
      </button>
  
      <button
        class="gv-topbar-icon-btn"
        type="button"
        (click)="cycleLang()"
        [pTooltip]="langTooltip()"
        tooltipPosition="bottom"
      >
        <i class="pi pi-language"></i>
      </button>
  
      @if (authService.currentUser()) {
        <button
          class="gv-topbar-icon-btn"
          type="button"
          [pTooltip]="accountTooltip()"
          tooltipPosition="bottom"
        >
          <i class="pi pi-user"></i>
        </button>
  
        <button
          class="gv-topbar-icon-btn"
          type="button"
          (click)="logout()"
          [pTooltip]="logoutTooltip()"
          tooltipPosition="bottom"
        >
          <i class="pi pi-sign-out"></i>
        </button>
      }
    </div>
  </header>
