<app-topnav />

<div class="form-page">
  <a routerLink="/shop/customers" class="back-link">
    <i class="pi pi-arrow-left"></i> {{ 'customerForm.backBtn' | translate }}
  </a>

  <div class="form-card gv-card gv-ticket-edge">
    <span class="gv-eyebrow">{{ 'customerForm.eyebrow' | translate }}</span>
    <h1>{{ 'customerForm.title' | translate }}</h1>
    <p class="form-sub">{{ 'customerForm.subtitle' | translate }}</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-body">
      <div class="field">
        <label for="fullName">{{ 'customerForm.fullName' | translate }}</label>
        <input id="fullName" type="text" pInputText formControlName="fullName" class="w-full" />
      </div>

      <div class="field">
        <label for="nic">{{ 'customerForm.nic' | translate }}</label>
        <input id="nic" type="text" pInputText formControlName="nic" [placeholder]="'customerForm.nicPlaceholder' | translate" class="w-full" />
      </div>

      <div class="field-row">
        <div class="field">
          <label for="phone">{{ 'customerForm.phone' | translate }}</label>
          <input id="phone" type="text" pInputText formControlName="phone" class="w-full" />
        </div>
        <div class="field">
          <label for="email">{{ 'customerForm.email' | translate }}</label>
          <input id="email" type="email" pInputText formControlName="email" class="w-full" />
        </div>
      </div>

      <div class="field">
        <label for="address">{{ 'customerForm.address' | translate }}</label>
        <input id="address" type="text" pInputText formControlName="address" class="w-full" />
      </div>

      @if (errorMessage()) {
        <p-message severity="error" [text]="errorMessage()!" styleClass="w-full" />
      }

      <p-button type="submit" [label]="'customerForm.submitBtn' | translate" styleClass="gv-submit-btn" [loading]="loading()" />
    </form>
  </div>
</div>
