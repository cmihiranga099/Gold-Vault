<app-topnav />

<div class="shop-page">
  <div class="shop-header">
    <div>
      <span class="gv-eyebrow">Shop portal</span>
      <h1>Customers</h1>
    </div>
    <a routerLink="/shop/customers/new" class="action-link action-link-primary">
      <i class="pi pi-user-plus"></i> Register customer
    </a>
  </div>

  <div class="search-bar">
    <span class="search-input-wrap">
      <i class="pi pi-search"></i>
      <input
        type="text"
        pInputText
        [(ngModel)]="searchTerm"
        (ngModelChange)="searchTerm.set($event)"
        (keyup.enter)="onSearch()"
        placeholder="Search by name or NIC..."
        class="w-full"
      />
    </span>
    <p-button label="Search" (onClick)="onSearch()" />
  </div>

  @if (errorMessage()) {
    <div class="shop-empty gv-card">
      <p>{{ errorMessage() }}</p>
    </div>
  } @else {
    <div class="table-card gv-card">
      <p-table
        [value]="customers()"
        [lazy]="true"
        (onLazyLoad)="onLazyLoad($event)"
        [paginator]="true"
        [rows]="rows"
        [totalRecords]="totalRecords()"
        [loading]="loading()"
        [rowsPerPageOptions]="[10, 20, 50]"
        styleClass="gv-table"
        [rowHover]="true"
      >
        <ng-template pTemplate="header">
          <tr>
            <th>Name</th>
            <th>NIC</th>
            <th>Phone</th>
            <th>KYC status</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-customer>
          <tr [routerLink]="['/shop/customers', customer.id]" class="table-row-link">
            <td>{{ customer.fullName }}</td>
            <td class="gv-mono">{{ customer.nic }}</td>
            <td>{{ customer.phone || '—' }}</td>
            <td>
              <p-tag [value]="customer.kycStatus" [severity]="kycSeverity(customer.kycStatus)" />
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="4" class="empty-cell">No customers found.</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  }
</div>
