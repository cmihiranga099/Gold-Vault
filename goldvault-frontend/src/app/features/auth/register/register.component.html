<div class="login-page">
  <div class="login-brand">
    <div class="login-brand-mark">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="#C9A14A" stroke-width="2"/>
        <path d="M12 20 L20 12 L28 20 L20 28 Z" stroke="#C9A14A" stroke-width="1.5" fill="none"/>
        <circle cx="20" cy="20" r="3" fill="#C9A14A"/>
      </svg>
    </div>
    <h1>GoldVault</h1>
    <p class="login-brand-tag">Digital pawn tickets, kept honestly.</p>
  </div>

  <div class="login-card gv-ticket-edge">
    <span class="gv-eyebrow">New account</span>
    <h2>Create your account</h2>
    <p class="login-sub">Track your pawn tickets and gold sales in one place.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="field">
        <label for="fullName">Full name</label>
        <input id="fullName" type="text" pInputText formControlName="fullName" placeholder="As it appears on your NIC" class="w-full" />
      </div>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" pInputText formControlName="username" placeholder="Choose a username" class="w-full" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" pInputText formControlName="email" placeholder="you@example.com" class="w-full" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <p-password
          id="password"
          formControlName="password"
          [toggleMask]="true"
          placeholder="At least 8 characters"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>

      @if (errorMessage()) {
        <p-message severity="error" [text]="errorMessage()!" styleClass="w-full" />
      }

      <p-button type="submit" label="Create account" styleClass="w-full gv-submit-btn" [loading]="loading()" />
    </form>

    <div class="login-footer">
      <span>Already have an account?</span>
      <a routerLink="/auth/login">Log in</a>
    </div>
  </div>
</div>
