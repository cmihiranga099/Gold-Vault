<div class="login-page">
  <div class="login-brand">
    <div class="login-brand-mark">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="#C9A14A" stroke-width="2"/>
        <path d="M12 20 L20 12 L28 20 L20 28 Z" stroke="#C9A14A" stroke-width="1.5" fill="none"/>
        <circle cx="20" cy="20" r="3" fill="#C9A14A"/>
      </svg>
    </div>
    <h1>GoldVault</h1>
    <p class="login-brand-tag">Digital pawn tickets, kept honestly.</p>
  </div>

  <div class="login-card gv-ticket-edge">
    <span class="gv-eyebrow">Sign in</span>
    <h2>Welcome back</h2>
    <p class="login-sub">Enter your details to access your account.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          pInputText
          formControlName="username"
          placeholder="e.g. shopadmin"
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <p-password
          id="password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="Enter your password"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>

      @if (errorMessage()) {
        <p-message severity="error" [text]="errorMessage()!" styleClass="w-full" />
      }

      <p-button
        type="submit"
        label="Log in"
        styleClass="w-full gv-submit-btn"
        [loading]="loading()"
      />
    </form>

    <div class="login-footer">
      <span>New customer?</span>
      <a routerLink="/auth/register">Create an account</a>
    </div>
  </div>
</div>
